        check_http_send "POST /api/v1/health HTTP/1.0\r\nUser-Agent: nginx-health-check\r\nX-Health-Check: true\r\nContent-Type: application/json\r\n\r\n{&quot;service&quot;: &quot;api&quot;, &quot;check&quot;: &quot;all&quot;}";
        check_http_expect_alive http_200 http_201 ;
        
        
