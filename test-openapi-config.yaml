# Test configuration with OpenAPI backends
backends:
  - id: petstore-api
    name: Petstore API
    description: Swagger Petstore API for testing OpenAPI aggregation
    servers:
      - id: petstore1
        host: petstore.swagger.io
        port: 443
        weight: 1
        backup: false
        down: false
    load_balance: round_robin
    openapi:
      enabled: true
      endpoints:
        - "/v2/swagger.json"
      base_path: "/v2"
      title: "Petstore API"
      description: "Official Swagger Petstore API"
      version: "1.0.0"
      tags: ["pets", "store"]

  - id: jsonplaceholder-api
    name: JSONPlaceholder API
    description: Fake REST API for testing
    servers:
      - id: jsonplaceholder1
        host: jsonplaceholder.typicode.com
        port: 443
        weight: 1
        backup: false
        down: false
    load_balance: round_robin
    openapi:
      enabled: true
      endpoints:
        - "/swagger.json"
        - "/openapi.json"
      base_path: "/"
      title: "JSONPlaceholder API"
      description: "Fake REST API for testing and prototyping"
      version: "1.0.0"
      tags: ["posts", "users", "comments"]

servers:
  - id: main-gateway
    name: Main API Gateway
    description: Primary gateway server
    listen:
      - "80"
      - "443 ssl http2"
    server_names:
      - api.example.com
      - gateway.example.com
    routes:
      - id: petstore-route
        name: Petstore Route
        description: Route to Petstore API
        path: "/petstore"
        methods: ["GET", "POST", "PUT", "DELETE"]
        backend_id: petstore-api
        strip_path: true
        preserve_host: false
        timeout: "30s"

      - id: jsonplaceholder-route
        name: JSONPlaceholder Route
        description: Route to JSONPlaceholder API
        path: "/api"
        methods: ["GET", "POST", "PUT", "DELETE"]
        backend_id: jsonplaceholder-api
        strip_path: true
        preserve_host: false
        timeout: "30s"

global:
  worker_processes: auto
  worker_connections: 1024
  keepalive_timeout: 65s
  client_max_body_size: 1m
  server_tokens: false
  gzip: true
  gzip_types:
    - text/plain
    - text/css
    - application/json
    - application/javascript
